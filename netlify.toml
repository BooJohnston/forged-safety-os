[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  timeout = 26

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Permissions-Policy = "camera=(self), microphone=(self), geolocation=(self)"
